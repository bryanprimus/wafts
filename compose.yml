services:
  postgres:
    image: postgres:18.3-alpine3.23
    ports:
      - '${POSTGRES_PORT:-5438}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wafts_password}
      POSTGRES_DB: ${POSTGRES_DB:-wafts}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8.6.2-alpine
    ports:
      - '${REDIS_PORT:-6389}:6379'

volumes:
  pgdata:
